name: Run CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '39 13 * * *' # run daily

jobs:
  ci_build:
    strategy:
      matrix:
        os: [ ubuntu-22.04, macos-14, ubuntu-22.04-arm, pi_3b ]
        include:
          - os: pi_3b
            platform: rpiv2
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35 # runtime across all OSs, runs can get queued
    steps:
    - name: Runner Info
      run: printenv | sort

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: '0' # need full history to get version from git tag

    - name: Install packaged dependencies
      run: .github/install_dependencies

    - name: Build
      run: VERBOSE=1 scripts/build_all_combos
      env:
        CMAKE_PLATFORM: ${{ matrix.platform || 'native' }}

    - name: Unit Tests
      run: scripts/run_unit_tests
      env:
        CMAKE_PLATFORM: ${{ matrix.platform || 'native' }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python
      run: uv python install 3.11

    - name: Run system tests
      run: |
        uv run --no-group dev pytest system_tests/tests/ \
          --binary builds/Release/src/rtl_airband \
          --nfm-binary builds/Release_nfm/src/rtl_airband \
          --mode thorough \
          -v

    - name: Install rtl_airband
      run: sudo cmake --install ${{github.workspace}}/builds/Release

    - name: Test run
      run: /usr/local/bin/rtl_airband -v
